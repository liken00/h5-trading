<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>复盘宝 - 股票热点资讯</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2128;
            --bg-card-hover: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent-red: #f85149;
            --accent-green: #3fb950;
            --accent-gold: #d29922;
            --accent-blue: #58a6ff;
            --border: #30363d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-primary); color: var(--text-primary); padding-bottom: 70px; min-height: 100vh; }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; }

        /* 顶部导航 */
        .header { position: sticky; top: 0; z-index: 100; background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
        .logo { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--accent-blue), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
        .search-btn { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; color: var(--text-muted); font-size: 14px; text-align: center; cursor: pointer; }
        .refresh-btn { width: 36px; height: 36px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: transform 0.3s; }
        .refresh-btn.spin { animation: spin 1s linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 指数行情条 */
        .indices-bar { background: var(--bg-secondary); padding: 6px 16px; display: flex; gap: 14px; overflow-x: auto; scrollbar-width: none; }
        .indices-bar::-webkit-scrollbar { display: none; }
        .index-item { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
        .index-name { font-size: 10px; color: var(--text-secondary); }
        .index-price { font-size: 12px; font-weight: 600; }
        .index-change { font-size: 10px; }
        .up { color: var(--accent-red); }
        .down { color: var(--accent-green); }

        /* Tab切换 */
        .tab-bar { background: var(--bg-primary); padding: 10px 16px 0; display: flex; gap: 4px; border-bottom: 1px solid var(--border); position: sticky; top: 57px; z-index: 90; }
        .tab-btn { padding: 8px 14px; font-size: 13px; color: var(--text-muted); border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .tab-btn.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); font-weight: 600; }
        .tab-btn .badge { font-size: 9px; background: var(--accent-red); color: #fff; padding: 1px 4px; border-radius: 6px; margin-left: 3px; }

        /* 股票列表 */
        .stock-list { padding: 8px 16px; }
        .stock-item { background: var(--bg-card); border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.2s; }
        .stock-item:active { background: var(--bg-card-hover); }
        .stock-rank { width: 20px; font-size: 12px; color: var(--text-muted); text-align: center; font-weight: 600; }
        .stock-info { flex: 1; min-width: 0; }
        .stock-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stock-code { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .stock-price { text-align: right; }
        .stock-price .price { font-size: 15px; font-weight: 700; }
        .stock-price .change { font-size: 12px; margin-top: 2px; }
        .up-text { color: var(--accent-red); }
        .down-text { color: var(--accent-green); }

        /* 自选股为空提示 */
        .empty-tip { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-tip .icon { font-size: 40px; margin-bottom: 10px; }

        /* 付费卡片 */
        .vip-section { padding: 16px; }
        .vip-title { font-size: 14px; font-weight: 700; color: var(--accent-gold); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .vip-card { background: linear-gradient(135deg, #2d1f0f, #1a1408); border: 1px solid var(--accent-gold); border-radius: 12px; padding: 16px; }
        .vip-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .vip-card-title { font-size: 15px; font-weight: 700; color: var(--accent-gold); }
        .vip-tag { font-size: 10px; background: var(--accent-gold); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
        .vip-card-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; line-height: 1.6; }
        .vip-features { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .vip-feature { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .vip-feature::before { content: '✓'; color: var(--accent-gold); font-weight: 700; }
        .vip-price { font-size: 20px; font-weight: 800; color: var(--accent-gold); margin-bottom: 12px; }
        .vip-price span { font-size: 12px; font-weight: 400; color: var(--text-secondary); }
        .vip-btn { width: 100%; background: linear-gradient(135deg, var(--accent-gold), #b8860b); color: #000; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }

        /* 悬浮邀请栏 */
        .invite-bar { position: fixed; bottom: 60px; left: 0; right: 0; background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 10px; z-index: 80; }
        .invite-bar-icon { font-size: 22px; }
        .invite-bar-text { flex: 1; font-size: 12px; color: var(--text-secondary); }
        .invite-bar-text strong { color: var(--accent-gold); }
        .invite-bar-btn { background: var(--accent-green); color: #fff; border: none; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }

        /* 底部Tab */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-secondary); border-top: 1px solid var(--border); display: flex; padding: 6px 0; padding-bottom: max(6px, env(safe-area-inset-bottom)); z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--text-muted); font-size: 10px; cursor: pointer; transition: color 0.2s; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item .nav-icon { font-size: 20px; }

        /* 股票详情弹窗 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: var(--bg-secondary); border-radius: 16px 16px 0 0; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; padding: 20px; transform: translateY(100%); transition: transform 0.3s; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-close { width: 28px; height: 28px; background: var(--bg-card); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; }
        .modal-stock-name { font-size: 18px; font-weight: 700; }
        .modal-stock-code { font-size: 12px; color: var(--text-muted); }
        .modal-price-row { display: flex; gap: 16px; margin-bottom: 16px; padding: 12px; background: var(--bg-card); border-radius: 10px; }
        .modal-price-item { flex: 1; }
        .modal-price-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .modal-price-value { font-size: 16px; font-weight: 700; }
        .modal-star-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; color: var(--accent-gold); display: flex; align-items: center; gap: 4px; }
        .modal-star-btn.active { background: rgba(210,153,34,0.1); border-color: var(--accent-gold); }
        .add-focus-ok { color: var(--accent-green); font-size: 12px; text-align: center; margin-top: 6px; }

        /* 加载动画 */
        .loading { display: flex; justify-content: center; padding: 30px; }
        .loading::after { content: ''; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: load 0.8s linear infinite; }
        @keyframes load { to { transform: rotate(360deg); } }

        @media (max-width: 480px) { .header { padding: 8px 12px; } .stock-item { padding: 10px; } }
    </style>
</head>
<body>

<!-- 顶部导航 -->
<div class="header">
    <div class="logo">复盘宝</div>
    <div class="search-btn" id="searchBtn">🔍 搜索股票</div>
    <div class="refresh-btn" id="refreshBtn" onclick="refreshData()">🔄</div>
</div>

<!-- 指数行情条 -->
<div class="indices-bar" id="indicesBar"><div class="loading"></div></div>

<!-- Tab切换 -->
<div class="tab-bar">
    <div class="tab-btn active" data-tab="hot" onclick="switchTab('hot')">🔥 热门</div>
    <div class="tab-btn" data-tab="wave2" onclick="switchTab('wave2')">🌊 二波</div>
    <div class="tab-btn" data-tab="zt" onclick="switchTab('zt')">📈 涨停</div>
    <div class="tab-btn" data-tab="vip" onclick="switchTab('vip')">💎 龙头资讯</div>
</div>

<!-- 主内容区 -->
<div id="mainContent">
    <div class="stock-list" id="stockList"><div class="loading"></div></div>
</div>

<!-- 付费VIP区 -->
<div class="vip-section" id="vipSection" style="display:none;">
    <div class="vip-title">💎 龙头战法精华资讯</div>
    <div class="vip-card">
        <div class="vip-card-header">
            <span class="vip-card-title">双二板龙头内参</span>
            <span class="vip-tag">月费</span>
        </div>
        <div class="vip-card-desc">每日更新经过修哥体系严格筛选的双二板龙头标的，配合理论教学、买点提示、止损提醒，让粉丝轻松跟随龙头战法稳定盈利。</div>
        <div class="vip-features">
            <div class="vip-feature">每日1-3只双二板龙头精选</div>
            <div class="vip-feature">买点/止损位实时提示</div>
            <div class="vip-feature">龙回头信号预警推送</div>
            <div class="vip-feature">专属教学群问答答疑</div>
        </div>
        <div class="vip-price">¥99<span>/月</span></div>
        <button class="vip-btn" onclick="alert('添加微信: xxxxxx 咨询付费')">立即订阅获取</button>
    </div>
</div>

<!-- 悬浮邀请栏 -->
<div class="invite-bar" id="inviteBar">
    <div class="invite-bar-icon">🎁</div>
    <div class="invite-bar-text">已有<strong>127</strong>人获取龙头资讯</div>
    <button class="invite-bar-btn" onclick="showInviteModal()">分享获积分</button>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('hot')">
        <span class="nav-icon">🔥</span>
        <span>热门</span>
    </div>
    <div class="nav-item" onclick="switchTab('wave2')">
        <span class="nav-icon">🌊</span>
        <span>二波</span>
    </div>
    <div class="nav-item" onclick="switchTab('zt')">
        <span class="nav-icon">📈</span>
        <span>涨停</span>
    </div>
    <div class="nav-item" onclick="switchTab('focus')">
        <span class="nav-icon">⭐</span>
        <span>自选</span>
    </div>
</div>

<!-- 股票详情弹窗 -->
<div class="modal-overlay" id="stockModal">
    <div class="modal-content">
        <div class="modal-header">
            <div>
                <div class="modal-stock-name" id="modalName">—</div>
                <div class="modal-stock-code" id="modalCode">—</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <button class="modal-star-btn" id="modalStarBtn" onclick="toggleFocus()">☆ 关注</button>
                <div class="modal-close" onclick="closeModal()">×</div>
            </div>
        </div>
        <div class="modal-price-row" id="modalPriceRow"></div>
        <div id="addFocusOk" class="add-focus-ok" style="display:none">✅ 已添加到自选</div>
    </div>
</div>

<script>
// ============ 全局状态 ============
let stockData = [];
let indicesData = [];
let currentTab = 'hot';
let focusStocks = JSON.parse(localStorage.getItem('focus_stocks') || '[]');
let currentStock = null;

// ============ 指数数据 ============
const INDEX_CODES = ['sh000001','sz399001','sz399006','sh000300','sh000016'];
const INDEX_NAMES = {'sh000001':'上证','sz399001':'深成','sz399006':'创业','sh000300':'沪深300','sh000016':'上证50'};

async function fetchIndices() {
    try {
        const res = await fetch(`https://qt.gtimg.cn/q=${INDEX_CODES.join(',')}`);
        const text = await res.text();
        const lines = text.split('\n');
        let html = '';
        for (const line of lines) {
            const m = line.match(/="([^"]+)"/);
            if (!m) continue;
            const fields = m[1].split('~');
            if (fields.length < 10) continue;
            const code = fields[0].replace(/[^a-z0-9]/gi,'');
            const name = INDEX_NAMES[code] || fields[1];
            const price = parseFloat(fields[3]).toFixed(2);
            const change = parseFloat(fields[31]);
            const changePct = ((change / (parseFloat(fields[3]) - change)) * 100).toFixed(2);
            const cls = change >= 0 ? 'up' : 'down';
            const sign = change >= 0 ? '+' : '';
            html += `<div class="index-item">
                <span class="index-name">${name}</span>
                <span class="index-price">${price}</span>
                <span class="index-change ${cls}">${sign}${change.toFixed(2)}%</span>
            </div>`;
        }
        document.getElementById('indicesBar').innerHTML = html || '<div style="padding:8px;color:var(--text-muted);font-size:12px;">暂无数据</div>';
    } catch(e) { document.getElementById('indicesBar').innerHTML = '<div style="padding:8px;color:var(--text-muted);font-size:12px;">加载失败</div>'; }
}

// ============ 股票数据 ============
async function fetchStockData() {
    try {
        // 腾讯财经免费行情接口 - 获取涨幅前50
        const res = await fetch('https://qt.gtimg.cn/q=sh000001,sz399001,sz399006');
        const text = await res.text();
        
        // 用东方财富获取涨停股（简单的CORS代理方案：用牛股吧的接口）
        let hotStocks = [];
        try {
            const ztRes = await fetch('https://push2.eastmoney.com/api/qt/clist/get?cb=cb&pn=1&pz=30&po=1&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281&fltt=2&invt=2&fid=f3&fs=m:0+t:6,m:0+t:13,m:1+t:2,m:1+t:23&fields=f2,f3,f4,f12,f14,f15,f16,f17,f18&_=1234');
            const ztText = await ztRes.text();
            const ztJson = JSON.parse(ztText.replace('cb(','').replace(')',''));
            if (ztJson.data && ztJson.data.diff) {
                hotStocks = ztJson.data.diff.map(s => ({
                    name: s.f14,
                    code: s.f12,
                    price: s.f2,
                    change: s.f3,
                    reason: '涨停'
                })).filter(s => s.price > 0 && s.change != 0);
            }
        } catch(e) { console.log('涨停数据获取失败:', e); }

        // 如果没拿到数据，用模拟数据展示
        if (hotStocks.length === 0) {
            hotStocks = getMockStockData();
        }
        
        stockData = hotStocks;
        renderStockList();
    } catch(e) {
        console.log('股票数据获取失败:', e);
        stockData = getMockStockData();
        renderStockList();
    }
}

function getMockStockData() {
    // 备用模拟数据
    return [
        {name:'大众交通',code:'600611',price:9.87,change:10.04,reason:'涨停'},
        {name:'通鼎互联',code:'002491',price:8.45,change:9.96,reason:'连续涨停'},
        {name:'上海贝岭',code:'600171',price:15.23,change:10.03,reason:'芯片概念'},
        {name:'赛力斯',code:'601127',price:92.10,change:8.56,reason:'问界合作'},
        {name:'华电能源',code:'600726',price:3.67,change:10.21,reason:'电力板块'},
        {name:'中国船舶',code:'600150',price:42.30,change:5.43,reason:'中船系'},
        {name:'人民网',code:'603000',price:18.92,change:-2.31,reason:'AI概念'},
        {name:'宁德时代',code:'300750',price:198.50,change:-1.87,reason:'新能源'},
        {name:'拓维信息',code:'002261',price:12.34,change:6.78,reason:'算力概念'},
        {name:'中兴通讯',code:'000063',price:32.10,change:4.23,reason:'通信设备'},
        {name:'北方华创',code:'002371',price:368.00,change:3.45,reason:'半导体'},
        {name:'比亚迪',code:'002594',price:267.80,change:-0.92,reason:'汽车整车'},
    ];
}

// ============ 渲染 ============
function renderStockList() {
    let filtered = [];
    if (currentTab === 'hot') {
        filtered = [...stockData].sort((a,b) => b.change - a.change);
    } else if (currentTab === 'wave2') {
        // 二波策略：找回调后重新启动的股票
        filtered = [...stockData].filter(s => s.change >= 2 && s.change <= 8).sort((a,b) => b.change - a.change);
    } else if (currentTab === 'zt') {
        filtered = [...stockData].filter(s => s.change >= 9).sort((a,b) => b.change - a.change);
    } else if (currentTab === 'focus') {
        filtered = stockData.filter(s => focusStocks.includes(s.code));
    } else if (currentTab === 'vip') {
        // VIP tab - 不显示列表
        document.getElementById('stockList').innerHTML = '';
        document.getElementById('vipSection').style.display = 'block';
        document.getElementById('inviteBar').style.display = 'none';
        return;
    }

    document.getElementById('vipSection').style.display = 'none';
    document.getElementById('inviteBar').style.display = currentTab === 'vip' ? 'none' : 'flex';

    if (filtered.length === 0) {
        if (currentTab === 'focus') {
            document.getElementById('stockList').innerHTML = '<div class="empty-tip"><div class="icon">⭐</div><div>暂无自选股</div><div style="font-size:12px;margin-top:6px;">去热门列表添加关注</div></div>';
        } else {
            document.getElementById('stockList').innerHTML = '<div class="loading"></div>';
        }
        return;
    }

    let html = '';
    filtered.forEach((s, i) => {
        const cls = s.change >= 0 ? 'up-text' : 'down-text';
        const sign = s.change >= 0 ? '+' : '';
        html += `<div class="stock-item" onclick="showStockDetail('${s.code}')">
            <div class="stock-rank">${i+1}</div>
            <div class="stock-info">
                <div class="stock-name">${s.name}</div>
                <div class="stock-code">${s.code}</div>
            </div>
            <div class="stock-price">
                <div class="price">${s.price}</div>
                <div class="change ${cls}">${sign}${s.change.toFixed(2)}%</div>
            </div>
        </div>`;
    });
    document.getElementById('stockList').innerHTML = html;
}

// ============ Tab切换 ============
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const navMap = {hot:0,wave2:1,zt:2,focus:3};
    if (navMap[tab] !== undefined) document.querySelectorAll('.nav-item')[navMap[tab]].classList.add('active');
    renderStockList();
}

// ============ 股票详情 ============
function showStockDetail(code) {
    const stock = stockData.find(s => s.code === code);
    if (!stock) return;
    currentStock = stock;
    const isFocused = focusStocks.includes(code);
    document.getElementById('modalName').textContent = stock.name;
    document.getElementById('modalCode').textContent = stock.code;
    const cls = stock.change >= 0 ? 'up-text' : 'down-text';
    const sign = stock.change >= 0 ? '+' : '';
    document.getElementById('modalPriceRow').innerHTML = `
        <div class="modal-price-item"><div class="modal-price-label">现价</div><div class="modal-price-value ${cls}">${stock.price}</div></div>
        <div class="modal-price-item"><div class="modal-price-label">涨跌幅</div><div class="modal-price-value ${cls}">${sign}${stock.change.toFixed(2)}%</div></div>
        <div class="modal-price-item"><div class="modal-price-label">涨停原因</div><div class="modal-price-value" style="font-size:12px;">${stock.reason || '—'}</div></div>
    `;
    const starBtn = document.getElementById('modalStarBtn');
    starBtn.textContent = isFocused ? '★ 已关注' : '☆ 关注';
    starBtn.classList.toggle('active', isFocused);
    document.getElementById('addFocusOk').style.display = 'none';
    document.getElementById('stockModal').classList.add('active');
}

function closeModal() { document.getElementById('stockModal').classList.remove('active'); }

function toggleFocus() {
    if (!currentStock) return;
    const idx = focusStocks.indexOf(currentStock.code);
    if (idx >= 0) {
        focusStocks.splice(idx, 1);
    } else {
        focusStocks.push(currentStock.code);
        document.getElementById('addFocusOk').style.display = 'block';
        setTimeout(() => { document.getElementById('addFocusOk').style.display = 'none'; }, 2000);
    }
    localStorage.setItem('focus_stocks', JSON.stringify(focusStocks));
    const isFocused = focusStocks.includes(currentStock.code);
    const starBtn = document.getElementById('modalStarBtn');
    starBtn.textContent = isFocused ? '★ 已关注' : '☆ 关注';
    starBtn.classList.toggle('active', isFocused);
}

// ============ 刷新 ============
async function refreshData() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spin');
    await Promise.all([fetchIndices(), fetchStockData()]);
    setTimeout(() => btn.classList.remove('spin'), 1000);
}

// ============ 分享 ============
function showInviteModal() { alert('分享海报功能开发中，请稍候'); }

// ============ 初始化 ============
document.addEventListener('DOMContentLoaded', () => {
    fetchIndices();
    fetchStockData();
    // 每2分钟自动刷新
    setInterval(() => { fetchIndices(); }, 120000);
});
</script>
